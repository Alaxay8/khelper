apiVersion: v1
kind: Config
clusters:
  - name: local
    cluster:
      server: https://127.0.0.1:6443
      insecure-skip-tls-verify: true
users:
  - name: dev
    user:
      token: dummy-token
contexts:
  - name: local-shop
    context:
      cluster: local
      user: dev
      namespace: shop
current-context: local-shop
