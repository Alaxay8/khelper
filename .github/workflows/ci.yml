name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Download modules
        run: go mod download

      - name: gofmt check
        run: |
          files=$(find . -type f -name '*.go' -not -path './vendor/*')
          test -z "$(gofmt -l $files)"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
