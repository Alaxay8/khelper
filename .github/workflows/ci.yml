name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Download modules
        run: go mod download

      - name: gofmt check
        run: |
          unformatted="$(find . -type f -name '*.go' -not -path './vendor/*' -print0 | xargs -0r gofmt -l)"
          test -z "$unformatted" || {
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
